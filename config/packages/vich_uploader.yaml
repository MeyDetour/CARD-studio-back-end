vich_uploader:
    db_driver: orm

    metadata:
        type: attribute

    mappings:
        game_image:
            uri_prefix: /images/game
            upload_destination: '%kernel.project_dir%/public/images/game'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        card_image:
                    uri_prefix: /images/card
                    upload_destination: '%kernel.project_dir%/public/images/card'
                    namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
